version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      - "${POSTGRES_PORT}:5432"

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL}
      PORT: ${AUTH_SERVICE_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    volumes:
      - ./list_unique_users.csv:/app/ISTN101_unique_users.csv:ro

  quiz-service:
    build:
      context: ./quiz-service
    container_name: quiz-service
    environment:
      DATABASE_URL: ${QUIZ_SERVICE_DATABASE_URL}
      PORT: ${QUIZ_SERVICE_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres

  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    ports:
      - "${HAPROXY_PORT_HTTP}:80"
      - "${HAPROXY_PORT_STATS}:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - auth-service
      - quiz-service

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    privileged: true
    devices:
      - "/dev/kmsg:/dev/kmsg"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${CADVISOR_PORT}:8080"

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - cadvisor
      - haproxy

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GRAFANA_USERS_ALLOW_SIGN_UP}
    depends_on:
      - prometheus

  locust:
    image: locustio/locust
    container_name: locust
    ports:
      - "${LOCUST_PORT}:8089"
    volumes:
      - ./locust:/mnt/locust
      - ./list_login_user_diawal.csv:/mnt/locust/list_login_user_diawal.csv
      - ./log_quiz_attempts.csv:/mnt/locust/ISTN101_quiz_attempts.csv
    command: -f /mnt/locust/locustfile.py --host http://haproxy
    depends_on:
      - haproxy

volumes:
  pgdata:

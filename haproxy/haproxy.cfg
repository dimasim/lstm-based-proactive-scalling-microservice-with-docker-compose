global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend stats
    bind *:8404
    http-request use-service promo-metrics if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 5s

frontend http_front
    bind *:80
    
    acl url_auth path_beg /auth
    acl url_quiz path_beg /quiz
    
    use_backend auth_back if url_auth
    use_backend quiz_back if url_quiz

backend auth_back
    balance roundrobin
    server auth1 auth-service:3000 check

backend quiz_back
    balance roundrobin
    server quiz1 quiz-service:8080 check
